{% extends 'base.html' %}
{% block content %}
    <div class="form-container">
        <h1>Alterar Agendamento</h1>
        <p><strong>Veiculo:</strong> {{ agendamento.veiculo.nome }}</p>
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label>Nova data:</label>
                <input type="date" name="data" value="{{ agendamento.data }}" required>
            </div>
            <button class="btn btn-center">Salvar</button>
        </form>
    </div>
{% endblock %}
