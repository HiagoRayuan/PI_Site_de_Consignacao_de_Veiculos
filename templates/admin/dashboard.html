{% extends 'base.html' %}
{% block content %}
    <h1>Painel Administrativo</h1>
    <div class="cards">
        <a href="/admin/veiculos" class="card card-admin card-link">                 
            <div class="card-body">
                <div class="card-icon">🚗</div> 
                <h3>Veículos</h3>
                <p class="card-numero">{{ veiculos }}</p>
                <p class="card-label">cadastrados</p>
            </div>
        </a>

        <a href="/agendamentos" class="card card-admin card-link">
            <div class="card-body">
                <div class="card-icon">📅</div>
                <h3>Agendamentos</h3>
                <p class="card-numero">{{ agendamentos }}</p>
                <p class="card-label">ativos</p>
            </div>
        </a>
        
        <a href="/admin/usuarios" class="card card-admin card-link">
            <div class="card-body">
                <div class="card-icon">👥</div>
                <h3>Usuários</h3>
                <p class="card-numero">{{ usuarios }}</p>
                <p class="card-label">cadastrados</p>
            </div>
        </a>
    </div>
{% endblock %}
