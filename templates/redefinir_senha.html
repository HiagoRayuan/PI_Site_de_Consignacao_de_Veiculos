{% extends 'base.html' %}
{% block content %}
    <div class="form-container">
        <h1>Redefinir senha</h1>
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group senha-box">
                <input type="password" id="senha" name="senha" placeholder="Nova senha" required>
                <span onclick="toggleSenha('senha')" class="eye">
                     <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="20">
                        <path d="M1 12s4-6 11-6 11 6 11 6-4 6-11 6-11-6-11-6z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </span>
            </div>
            <div class="form-group senha-box">
                 <input type="password" id="confirmar_senha" name="confirmar_senha" placeholder="Confirmar nova senha" required>
                <span onclick="toggleSenha('confirmar_senha')" class="eye">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="20">
                        <path d="M1 12s4-6 11-6 11 6 11 6-4 6-11 6-11-6-11-6z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </span>
            </div>
            <button type="submit" class="btn btn-center">Redefinir senha</button>
        </form>
    </div>
{% endblock %}
