<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <title>{{ veiculo.nome }}</title>
    </head>
    <body>
        {% extends 'base.html' %}
        {% block content %}

            <div class="veiculo-container">
                <!--Galeria-->
                <div class="galeria">
                    <!--Imagem Principal-->
                    <img id="imagem-principal" src="/{{ veiculo.imagem }}" class="imagem-principal">
                    <!--Miniaturas-->
                     <div class="miniaturas">
                        <img src="/{{ veiculo.imagem }}" onclick="trocarImagem(this)">
                        {% for foto in veiculo.fotos %}
                            <img src="/{{ foto.caminho }}" onclick="trocarImagem(this)">
                        {% endfor %}
                     </div>
                </div>
                <!--Info-->
                <div class="info">
                    <h1>{{ veiculo.nome }}</h1>
                    <p class="preco">{{ veiculo.preco | moeda }}</p>
                    <p class="descricao">{{ veiculo.descricao }}</p>
                    <hr>

                    <!--Form Agendamento-->
                    <form method="POST" class="form-agendamento">
                        <label>Escolha uma data:</label>
                        <input type="date" name="data" required>
                        <button class="btn">Agendar visita</button>
                    </form>
                </div>
            </div>
        {% endblock %}
    </body>
</html>
