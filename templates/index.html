<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <title>Consignação de Veículos</title>
        <link rel="stylesheet" href"{{ url_for('static', filename='css/style.css')}}>
    </head>
    <body>
        <h1>Veículos disponíveis</h1>
        {% if session.get('is_admin') %}
        <a href="/cadastrar">Cadastrar novo veículo</a>
        {% endif %}
        <a href="/agendamentos">Ver agendamentos</a>
        {% if session.get('usuario_id') %}
        <a href="/logout">Logout</a>
        {% else %}
            <a href="/login">Login</a>
        {% endif %}

        <div class="container">
            {% for v in veiculos %}
            <div class="card">
                <img src="/{{ v.imagem }}" width="200">
                <h2>{{ v.nome }}</h2>
                <p> R$ {{ v.preco }}</p>
                <a href="/veiculo/{{ v.id }}">Ver detalhes</a>
            </div>
            {% endfor %}
        </div>
    </body>
</html>
