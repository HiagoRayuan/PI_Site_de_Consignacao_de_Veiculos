{% extends 'base.html' %}
{% block content %}
    <!DOCTYPE html>
        <head>
            <meta charset="UTF-8">
            <title></title>
        </head>
        <body>

            <div class="form-container" style="max-width: 500px;">
                <h1>Cadastrar Veículo</h1>

                <form method="POST" enctype="multipart/form-data">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="form-group">
                        <input type="text" name="nome" placeholder="Nome do veículo" required>
                    </div>
                    <div class="form-group">
                        <textarea name="descricao" placeholder="Descrição" required></textarea>
                    </div>
                    <div class="form-group">
                        <input type="number" step="0.01" name="preco" placeholder="Preço (R$)" required>
                    </div>
                    <div class="form-group upload-group">
                        <label class="upload-label">Foto principal do anúncio
                        </label>
                        <input type="file" name="imagem" accept="image/*" required>
                    </div>
                    <div class="form-group upload-group">
                        <label class="upload-label">Fotos adicionais</label>
                        <input type="file" name="imagens" accept="image/*" multiple required>
                    </div>
                    <button class="btn btn-center">Cadastrar</button>
                </form>
            </div>    
        </body>
    </html>
{% endblock %}
