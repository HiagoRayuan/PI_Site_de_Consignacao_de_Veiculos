<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Veículo</title>
</head>
<body>
    <h1>Cadastrar Veículo</h1>
    <a href="/">Voltar</a>
    <form method="POST" enctype="multipart/form-data">

        <input type="text" name="nome" placeholder="Nome do veículo" required><br><br>
        <textarea name="descricao" placeholder="Descrição" required></textarea><br><br>
        <input type="number" step="0.01" name="preco" placeholder="Preço" required><br><br>
        <input type="file" name="imagem" required><br><br>
       
        <button type="submit">Cadastrar</button>
    </form>
</body>
