{% extends 'base.html' %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title></title>
    </head>
    <body>
        <div class="form-container">
            <h1>Criar conta</h1>
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <input type="text" name="nome" placeholder="Nome completo" required>
                </div>
                <div class="form-group">
                    <input type="email" name="email" placeholder="Email" required>
                </div>
                <div class="form-group">
                    <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000" required>
                </div>
                <div class="form-group senha-box">
                    <input type="password" id="senha" name="senha" placeholder="Senha" required>
                    <span onclick="toggleSenha('senha')" class="eye">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="20">
                            <path d="M1 12s4-6 11-6 11 6 11 6-4 6-11 6-11-6-11-6z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </span>
                </div>
                <div class="form-group senha-box">
                    <input type="password" id="confirmar_senha" name="confirmar_senha" placeholder="Confirmar senha" required>
                    <span onclick="toggleSenha('confirmar_senha')" class="eye">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="20">
                            <path d="M1 12s4-6 11-6 11 6 11 6-4 6-11 6-11-6-11-6z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </span>
                </div>
                <button type="submit" class="btn btn-center">Cadastrar</button>
            </form>
            <div class="link">
                <p>Já tem conta? <a href="/login">Entrar</a></p>
            </div>
        </div>    
    </body>
</html>
{% endblock %}
