{% extends 'base.html' %}
{% block content %}
    <div>
        <h1>Esqueci minha senha</h1>
        <p style="text-align: center; color: #636e72; margin-bottom: 20px;">Digite seu email e enviaremos um link para redefinir sua senha.</p>
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <input type="email" name="email" placeholder="Seu email" required>
            </div>
            <button type="submit" class="btn btn-center">Enviar link</button>
        </form>
        <div class="link">
            <p>Lembrou a senha? <a href="/login">Entrar</a></p>
        </div>
    </div>
{% endblock %}
